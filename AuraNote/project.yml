name: AuraNote
options:
  bundleIdPrefix: com.eastlakestudio
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  WhisperKit:
    url: https://github.com/argmaxinc/WhisperKit.git
    from: 0.9.0
  FluidAudio:
    url: https://github.com/FluidInference/FluidAudio.git
    branch: main

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "J4RT98GF7B"
    SWIFT_VERSION: "5.9"

targets:
  AuraNote:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - AuraNote
    dependencies:
      - package: WhisperKit
      - package: FluidAudio
    settings:
      base:
        INFOPLIST_FILE: AuraNote/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.eastlakestudio.auranote
        PRODUCT_NAME: AuraNote
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: "YES"
    info:
      path: AuraNote/Info.plist
      properties:
        CFBundleName: AuraNote
        CFBundleDisplayName: 听纪
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSMicrophoneUsageDescription: "听纪需要访问麦克风以录制会议音频"
        NSSpeechRecognitionUsageDescription: "听纪需要语音识别权限以进行实时语音转写"
        LSApplicationCategoryType: "public.app-category.productivity"
    entitlements:
      path: AuraNote/AuraNote.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.device.audio-input: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-write: true
        com.apple.security.files.downloads.read-write: true

  AuraNoteTests:
    type: bundle.unit-test
    supportedDestinations: [iOS, macOS]
    sources:
      - AuraNoteTests
    dependencies:
      - target: AuraNote
    settings:
      base:
        GENERATE_INFOPLIST_FILE: "YES"
        PRODUCT_BUNDLE_IDENTIFIER: com.eastlakestudio.auranote.tests
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/AuraNote.app/Contents/MacOS/AuraNote
        BUNDLE_LOADER: $(TEST_HOST)

schemes:
  AuraNote:
    build:
      targets:
        AuraNote: [run, test, profile, analyze, archive]
        AuraNoteTests: [test]
    archive:
      config: Release
    test:
      targets:
        - AuraNoteTests
